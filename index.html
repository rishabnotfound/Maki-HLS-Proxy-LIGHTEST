<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maki HLS Proxy</title>
<link rel="icon" href="./public/logo.png"/>
<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  background: radial-gradient(circle at top, #141414, #050505);
  color:#e5e5e5;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Card container */

.container{
  text-align:center;
  padding:3rem 3.5rem;
  background:rgba(20,20,20,.75);
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  box-shadow:0 15px 50px rgba(0,0,0,.7);
  max-width:420px;
  width:90%;
}

/* Logo */

.logo{
  width:170px;
  height:170px;
  object-fit:cover;
  border-radius:26px;            /* curved edges */
  padding:8px;
  background:#0f0f0f;
  margin-bottom:30px;
  box-shadow:
    0 0 25px rgba(0,0,0,.7),
    0 0 15px rgba(255,255,255,.05);
  transition:.3s;
}

.logo:hover{
  transform:scale(1.05);
}

/* Title */

h1{
  font-weight:500;
  font-size:1.1rem;
  letter-spacing:1px;
}

/* Status */

.status{
  margin-top:1rem;
  font-size:.9rem;
  color:#22c55e;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#22c55e;
  box-shadow:0 0 10px #22c55e;
  animation:pulse 1.6s infinite;
}

@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:.35}
}

/* Routes */

.routes{
  margin-top:2rem;
  font-size:.8rem;
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

code{
  background:#111;
  border:1px solid #222;
  padding:6px 12px;
  border-radius:8px;
  color:#ddd;
  transition:.2s;
}

code:hover{
  border-color:#22c55e;
  color:#22c55e;
}

/* GitHub button */

.github{
  margin-top:2rem;
  display:inline-block;
  font-size:.8rem;
  text-decoration:none;
  color:#888;
  border:1px solid #222;
  padding:8px 18px;
  border-radius:8px;
  transition:.25s;
}

.github:hover{
  color:#fff;
  border-color:#444;
  background:#0f0f0f;
}

.footer{
  margin-top:18px;
  font-size:.7rem;
  color:#555;
}

</style>
</head>

<body>

<div class="container">

  <img src="./public/logo.png" class="logo">

  <h1>Maki-HLS-Proxy-LIGHTEST</h1>

  <div class="status">
    <span class="dot"></span>
    Running Blazing Fast
  </div>

  <div class="routes">
    <code>/m3u8-proxy.m3u8</code>
    <code>/ts-proxy.ts</code>
    <code>/mp4-proxy.mp4</code>
  </div>

  <a class="github" href="https://github.com/rishabnotfound/Maki-HLS-Proxy-LIGHTEST" target="_blank">
    View on GitHub
  </a>

  <div class="footer">
    Lightweight HLS Proxy Engine 
  </div>

</div>

</body>
</html>
