worker_processes auto;
error_log /dev/stderr info;

events {
    worker_connections 4096;
}

http {
    resolver 8.8.8.8 8.8.4.4 ipv6=off;

    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    # Nginx native cache - much faster than Lua file ops
    proxy_cache_path /cache levels=1:2
                     keys_zone=hls_cache:10m
                     max_size=${CACHE_SIZE}
                     inactive=${CACHE_EXPIRY}
                     use_temp_path=off;

    # Increase buffer sizes
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" cache:$upstream_cache_status';

    access_log /dev/stdout main;

    server {
        listen 80;
        server_name _;

        # Landing page
        location = / {
            root /usr/local/openresty/nginx/html;
            try_files /index.html =404;
        }

        # Serve static files (logo, etc)
        location /public/ {
            root /usr/local/openresty/nginx/html;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Health check
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # M3U8 Playlist Proxy (no caching - playlists change)
        location /m3u8-proxy.m3u8 {
            content_by_lua_file /usr/local/openresty/nginx/lua/m3u8_proxy.lua;
        }

        # TS Segment Proxy (with nginx native caching)
        location /ts-proxy.ts {
            set $target_url "";
            set $custom_host "";
            set $custom_referer "";
            set $custom_origin "";
            set $custom_ua "";
            set $custom_cookie "";
            set $custom_auth "";
            set $custom_accept "";
            set $custom_accept_lang "";
            set $custom_accept_enc "";
            set $custom_xff "";
            set $custom_range "";

            # Access check + setup variables
            access_by_lua_file /usr/local/openresty/nginx/lua/ts_access.lua;

            # Proxy to target URL
            proxy_pass $target_url;
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;

            # Pass custom headers
            proxy_set_header Host $custom_host;
            proxy_set_header Referer $custom_referer;
            proxy_set_header Origin $custom_origin;
            proxy_set_header User-Agent $custom_ua;
            proxy_set_header Cookie $custom_cookie;
            proxy_set_header Authorization $custom_auth;
            proxy_set_header Accept $custom_accept;
            proxy_set_header Accept-Language $custom_accept_lang;
            proxy_set_header Accept-Encoding $custom_accept_enc;
            proxy_set_header X-Forwarded-For $custom_xff;
            proxy_set_header Range $custom_range;

            # Caching config
            proxy_cache hls_cache;
            proxy_cache_key $target_url;
            proxy_cache_valid 200 ${CACHE_EXPIRY};
            proxy_cache_use_stale error timeout updating;
            proxy_cache_lock on;

            # Don't cache range requests
            proxy_cache_bypass $http_range;
            proxy_no_cache $http_range;

            # Response headers
            add_header X-Cache-Status $upstream_cache_status always;
            add_header Cache-Control "public, max-age=86400" always;

            # CORS headers via Lua
            header_filter_by_lua_file /usr/local/openresty/nginx/lua/ts_headers.lua;
        }

        # MP4 Proxy (no caching, true streaming for minimal memory)
        location /mp4-proxy.mp4 {
            set $target_url "";
            set $custom_host "";
            set $custom_referer "";
            set $custom_origin "";
            set $custom_ua "";
            set $custom_cookie "";
            set $custom_auth "";
            set $custom_accept "";
            set $custom_accept_lang "";
            set $custom_accept_enc "";
            set $custom_xff "";
            set $custom_range "";

            # Access check + setup variables
            access_by_lua_file /usr/local/openresty/nginx/lua/ts_access.lua;

            # Proxy to target URL
            proxy_pass $target_url;
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;

            # Pass custom headers
            proxy_set_header Host $custom_host;
            proxy_set_header Referer $custom_referer;
            proxy_set_header Origin $custom_origin;
            proxy_set_header User-Agent $custom_ua;
            proxy_set_header Cookie $custom_cookie;
            proxy_set_header Authorization $custom_auth;
            proxy_set_header Accept $custom_accept;
            proxy_set_header Accept-Language $custom_accept_lang;
            proxy_set_header Accept-Encoding $custom_accept_enc;
            proxy_set_header X-Forwarded-For $custom_xff;
            proxy_set_header Range $custom_range;

            # No caching - MP4s are large, stream directly
            proxy_buffering off;

            # Hide upstream CORS headers (we set our own)
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Expose-Headers;

            # Response headers
            add_header Cache-Control "no-store" always;

            # CORS headers via Lua
            header_filter_by_lua_file /usr/local/openresty/nginx/lua/ts_headers.lua;
        }
    }
}
