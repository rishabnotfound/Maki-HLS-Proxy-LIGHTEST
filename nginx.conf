worker_processes auto;
error_log /dev/stderr info;

events {
    worker_connections 4096;
}

http {
    resolver 8.8.8.8 8.8.4.4 ipv6=off;

    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    # Shared dict for caching
    lua_shared_dict proxy_cache 10m;

    # Increase buffer sizes for large playlists
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /dev/stdout main;

    server {
        listen 8080;
        server_name _;

        # Health check
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # M3U8 Playlist Proxy
        location /m3u8-proxy.m3u8 {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS';
            add_header Access-Control-Allow-Headers '*';

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            content_by_lua_file /usr/local/openresty/nginx/lua/m3u8_proxy.lua;
        }

        # TS Segment Proxy
        location /ts-proxy.ts {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS';
            add_header Access-Control-Allow-Headers '*';

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            content_by_lua_file /usr/local/openresty/nginx/lua/ts_proxy.lua;
        }
    }
}
