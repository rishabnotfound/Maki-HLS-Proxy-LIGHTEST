worker_processes auto;
error_log /dev/stderr info;

env PROXY_HOST;
env CACHE_SIZE;
env CACHE_EXPIRY;

events {
    worker_connections 4096;
}

http {
    resolver 8.8.8.8 8.8.4.4 ipv6=off;

    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    # Shared dict for metadata
    lua_shared_dict proxy_cache 10m;

    # Increase buffer sizes
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /dev/stdout main;

    server {
        listen 80;
        server_name _;

        # Landing page
        location = / {
            root /usr/local/openresty/nginx/html;
            try_files /index.html =404;
        }

        # Health check
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # M3U8 Playlist Proxy
        location /m3u8-proxy.m3u8 {
            content_by_lua_file /usr/local/openresty/nginx/lua/m3u8_proxy.lua;
        }

        # TS Segment Proxy (with caching)
        location /ts-proxy.ts {
            content_by_lua_file /usr/local/openresty/nginx/lua/ts_proxy.lua;
        }
    }
}
